<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse - Velora</title>
  <link rel="icon" href="/assets/favicon.png" type="image/png">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/components.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-body">
  <div class="form-container">
    <div class="logo">Velora</div>
    <button class="theme-toggle auth-toggle" onclick="toggleTheme()" title="Cambiar tema" style="position: absolute; top: 20px; right: 20px;">
      <i data-lucide="sun"></i>
    </button>
    <h1 class="form-title" style="margin-top: 40px;">Crear cuenta</h1>
    <div class="form-subtitle">¿Ya tienes una cuenta? <a href="/pages/login.html">Inicia sesión</a></div>
    
    <form id="registerForm">
      <div class="form-group">
        <label class="form-label" for="name">Nombre</label>
        <input type="text" id="name" name="name" class="form-input" required autocomplete="name">
      </div>
      
      <div class="form-group">
        <label class="form-label" for="business_name">Nombre del negocio</label>
        <input type="text" id="business_name" name="business_name" class="form-input" required>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="register_email">Email o telefono</label>
        <input type="email" id="register_email" name="email" class="form-input" required autocomplete="email">
      </div>
      
      <div class="form-group">
        <label class="form-label" for="register_password">Contraseña</label>
        <div class="password-wrapper">
          <input type="password" id="register_password" name="password" class="form-input" required autocomplete="new-password">
          <button type="button" class="password-toggle" id="togglePassword">
            <i data-lucide="eye"></i>
          </button>
        </div>
      </div>
      
      <div class="form-actions">
        <button type="submit" class="btn-primary">Registrarse
            <i data-lucide="user-plus"></i>
        </button>
      </div>
    </form>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/apiService.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    lucide.createIcons();
    updateToggleIcons();
  </script>
</body>
</html>
