<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer Contraseña - Velora</title>
  <link rel="icon" href="/assets/favicon.png" type="image/png">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/forms.css">
  <link rel="stylesheet" href="/css/components.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-body">
  <div class="form-container">
    <div class="logo">Velora</div>
    <h1 class="form-title">Nueva contraseña</h1>
    <div class="form-subtitle">Ingresa tu nueva contraseña a continuación.</div>

    <div id="tokenError" style="display:none; background:#fff3f3; border:1px solid #f66; color:#c00; padding:12px; border-radius:8px; margin-bottom:16px; font-size:0.9rem;">
      ⚠️ Enlace de recuperación inválido o expirado. <a href="/pages/forgot-password.html" style="color:#c00; font-weight:bold;">Solicita uno nuevo aquí</a>.
    </div>
    
    <form id="resetPasswordForm">
      <div class="form-group">
        <label class="form-label" for="password">Nueva contraseña</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="new-password" class="form-input" required minlength="6" autocomplete="new-password">
          <button type="button" class="password-toggle" id="togglePassword">
            <i data-lucide="eye"></i>
          </button>
        </div>
      </div>
      
      <div class="form-actions">
        <button type="submit" id="submitBtn" class="btn-primary">Actualizar contraseña
            <i data-lucide="check"></i>
        </button>
      </div>
    </form>
  </div>

  <script src="/js/utils.js"></script>
  <script src="../js/config.js"></script>
  <script src="/js/apiService.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    lucide.createIcons();

    document.addEventListener('DOMContentLoaded', () => {
      // Leer el token desde la URL de forma robusta
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      console.log('URL actual:', window.location.href);
      console.log('Token encontrado:', token);

      if (!token) {
        document.getElementById('tokenError').style.display = 'block';
        document.getElementById('resetPasswordForm').style.display = 'none';
        return;
      }

      const resetForm = document.getElementById('resetPasswordForm');
      const submitBtn = document.getElementById('submitBtn');

      resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('password').value;

        if (window.toggleButtonLoading) window.toggleButtonLoading(submitBtn, true);

        try {
          const response = await window.ApiService.post('/auth/reset-password', { token, password });
          window.showToast('Contraseña actualizada con éxito', 'success');
          setTimeout(() => window.location.href = '/pages/login.html', 2000);
        } catch (error) {
          console.error('Error:', error);
          window.showToast(error.message || 'Error al restablecer la contraseña', 'error');
        } finally {
          if (window.toggleButtonLoading) window.toggleButtonLoading(submitBtn, false);
        }
      });
    });
  </script>
</body>
</html>
