<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Velora</title>
  <link rel="icon" href="/assets/favicon.png" type="image/png">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/components.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-body">
  <div class="form-container">
    <div class="logo">Velora</div>
    <button class="theme-toggle auth-toggle" onclick="toggleTheme()" title="Cambiar tema">
      <i data-lucide="sun"></i>
    </button>
    <h1 class="form-title">Iniciar sesión</h1>
    <div class="form-subtitle">¿No tienes una cuenta? <a href="/pages/register.html">Regístrate</a></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">Email o telefono</label>
        <input type="email" id="email" name="email" class="form-input" required autocomplete="username">
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" class="form-input" required autocomplete="current-password">
          <button type="button" class="password-toggle" id="togglePassword">
            <i data-lucide="eye"></i>
          </button>
        </div>
        <a href="/pages/forgot-password.html" class="forgot-password">Olvidaste tu contraseña</a>
      </div>
      
      <div class="form-actions">
        <button type="submit" class="btn-primary">Entrar
            <i data-lucide="arrow-right"></i>
        </button>
      </div>
    </form>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/apiService.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    lucide.createIcons();
    updateToggleIcons();
  </script>
</body>
</html>
