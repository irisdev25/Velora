<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña - Velora</title>
  <link rel="icon" href="/assets/favicon.png" type="image/png">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/forms.css">
  <link rel="stylesheet" href="/css/components.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-body">
  <div class="form-container">
    <div class="logo">Velora</div>
    <h1 class="form-title">Recuperar contraseña</h1>
    <div class="form-subtitle">Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</div>
    
    <form id="forgotPasswordForm">
      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" class="form-input" required placeholder="ejemplo@correo.com" autocomplete="email">
      </div>
      
      <div class="form-actions">
        <button type="submit" class="btn-primary">Enviar enlace
            <i data-lucide="send"></i>
        </button>
      </div>
      
      <div style="text-align: center; margin-top: 20px;">
        <a href="/pages/login.html" style="color: var(--primary-color); text-decoration: none; font-size: 0.9rem;">Volver al inicio de sesión</a>
      </div>
    </form>
  </div>

  <script src="/js/utils.js"></script>
  <script src="../js/config.js"></script>
  <script src="/js/apiService.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    lucide.createIcons();
    
    const forgotForm = document.getElementById('forgotPasswordForm');
    if (forgotForm) {
      forgotForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const submitBtn = forgotForm.querySelector('button[type="submit"]');
        
        if (window.toggleButtonLoading) window.toggleButtonLoading(submitBtn, true);
        
        try {
          const response = await window.ApiService.post('/auth/forgot-password', { email });
          window.showToast(response.message || 'Correo enviado con éxito', 'success');
          forgotForm.reset();
        } catch (error) {
          console.error('Error:', error);
          window.showToast(error.message || 'Error al enviar el correo', 'error');
        } finally {
          if (window.toggleButtonLoading) window.toggleButtonLoading(submitBtn, false);
        }
      });
    }
  </script>
</body>
</html>
